<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MER — Wallapop Ordenadores</title>
<style>
  body { font-family: sans-serif; background: #f8f8f6; margin: 0; padding: 2rem; }
  h1 { font-size: 1.2rem; font-weight: 500; color: #3d3d3a; margin-bottom: 0.25rem; }
  p  { font-size: 0.85rem; color: #73726c; margin-bottom: 1.5rem; }
  #erd { background: #ffffff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  #erd svg { width: 100%; }
</style>
</head>
<body>
<h1>Modelo Entidad-Relación — Wallapop Ordenadores</h1>
<p>Entidades recolectadas por el scraper: Vendedor, Anuncio, Imagen, Región y Predicción ML.</p>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: 'sans-serif',
  themeVariables: {
    darkMode: false,
    fontSize: '13px',
    lineColor: '#73726c',
    textColor: '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  VENDEDOR {
    string id PK
    string nombre
    float puntuacion
    int num_valoraciones
    int dias_cuenta
    date miembro_desde
    int verificaciones
    int articulos_vendidos
    string ciudad
    float latitud
    float longitud
  }
  ANUNCIO {
    string id PK
    string slug
    string titulo
    float precio
    string descripcion
    string url
    int num_imagenes
    string estado
    datetime fecha_scraping
    string region_busqueda
    string id_vendedor FK
  }
  IMAGEN {
    string id PK
    string url
    int posicion
    string id_anuncio FK
  }
  REGION {
    string nombre PK
    float latitud
    float longitud
    int distancia_busqueda
    string comunidad
  }
  PREDICCION {
    string id PK
    string id_anuncio FK
    float probabilidad_fraude
    int es_fraude
    float score_heuristico
    int kw_sospechosas
    int kw_confianza
    int tiene_telefono
    int contacto_externo
    int precio_bajo
    int sin_imagenes
    string modelo_usado
    datetime fecha_prediccion
  }
  VENDEDOR ||--o{ ANUNCIO : "publica"
  ANUNCIO ||--o{ IMAGEN : "contiene"
  ANUNCIO ||--|| PREDICCION : "recibe"
  REGION ||--o{ ANUNCIO : "contiene"
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
</body>
</html>
